  <script>
    // ==========================================
    // KONFIGURASI CRUD PER ENTITAS
    // ==========================================
    const crudConfig = {
      // >>> Entitas CRUD akan ditambahkan di sini oleh generate-crud.js <<<
    };

    // ==========================================
    // RENDER FORM
    // ==========================================
    function renderForm(entity) {
      const cfg = crudConfig[entity];
      const wrapper = document.getElementById(cfg.formWrapperId);
      wrapper.innerHTML = `<h4 id="${cfg.titleFormId}" class="text-lg font-semibold mb-4 text-slate-700">Tambah ${capitalize(entity)}</h4>`;

      for (const key in cfg.form) {
        const field = cfg.form[key];
        let html = '';

        switch (field.type) {
          case 'hidden':
            html = `<input type="hidden" id="${field.el}">`;
            break;
          case 'text': case 'email': case 'number': case 'password':
            html = `<input type="${field.type}" id="${field.el}" placeholder="${field.placeholder || ''}" class="border p-2.5 rounded-lg w-full">`;
            break;
          case 'textarea':
            html = `<textarea id="${field.el}" placeholder="${field.placeholder || ''}" class="border p-2.5 rounded-lg w-full"></textarea>`;
            break;
          case 'radio':
            html = field.options.map(opt => `<label class="mr-3"><input type="radio" name="${field.el}" value="${opt}"> ${opt}</label>`).join(' ');
            break;
          case 'dropdown':
            html = `<select id="${field.el}" class="border p-2.5 rounded-lg w-full">${field.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}</select>`;
            break;
        }

        wrapper.innerHTML += `<div class="mb-3">${html}</div>`;
      }

      wrapper.innerHTML += `
        <div class="flex gap-3">
          <button id="${cfg.btnSaveId}" onclick="simpanData('${entity}')" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg">Simpan</button>
          <button id="${cfg.btnCancelId}" onclick="resetForm('${entity}')" class="bg-slate-200 text-slate-700 px-5 py-2.5 rounded-lg hidden">Batal</button>
        </div>`;
    }

    // ==========================================
    // FORM HELPERS
    // ==========================================
    function getFieldValue(field) {
      if (field.type === 'radio') {
        const checked = document.querySelector(`input[name="${field.el}"]:checked`);
        return checked ? checked.value : '';
      }
      const el = document.getElementById(field.el);
      return el ? el.value : '';
    }

    function setFieldValue(field, val) {
      if (field.type === 'radio') {
        document.querySelectorAll(`input[name="${field.el}"]`).forEach(r => r.checked = (r.value === val));
      } else {
        const el = document.getElementById(field.el);
        if (el) el.value = val;
      }
    }

    // ==========================================
    // LOAD DATA
    // ==========================================
    function loadData(entity) {
      const cfg = crudConfig[entity];
      const tbody = document.getElementById(cfg.tableId);
      tbody.innerHTML = '<tr><td colspan="99">Memuat...</td></tr>';

      if (!cfg.loader || cfg.loader.length === 0) {
        google.script.run.withSuccessHandler(data => renderTable(entity, data)).getSheet(entity);
      } else {
        cfg.loader.forEach(fn => {
          google.script.run.withSuccessHandler(data => renderTable(entity, data))[fn]();
        });
      }
    }

    // ==========================================
    // RENDER TABLE
    // ==========================================
    function renderTable(entity, data) {
      const cfg = crudConfig[entity];
      const tbody = document.getElementById(cfg.tableId);
      tbody.innerHTML = '';

      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="99">Data kosong.</td></tr>';
        return;
      }

      data.forEach(row => {
        let cells = '';
        const columns = cfg.tableColumns || [];
        if (columns.length === 0) {
          cells = row.map(val => `<td>${val}</td>`).join('');
        } else {
          columns.forEach(col => {
            const val = row[col.key] !== undefined ? row[col.key] : '';
            cells += `<td>${val}</td>`;
          });
        }

        tbody.innerHTML += `
          <tr class="hover:bg-slate-50 border-b">
            ${cells}
            <td class="py-2 px-4 flex gap-2">
              <button onclick="editData('${entity}','${row.join("','")}')" class="text-blue-600 hover:underline">Edit</button>
              <button onclick="hapusData('${entity}','${row[0]}')" class="text-red-600 hover:underline">Hapus</button>
            </td>
          </tr>`;
      });
    }

    // ==========================================
    // SIMPAN DATA
    // ==========================================
    function simpanData(entity) {
      const cfg = crudConfig[entity];
      const obj = {};
      for (const key in cfg.form) {
        obj[key] = getFieldValue(cfg.form[key]);
      }
      if (!obj.nama) return showToast('Nama wajib diisi!', 'error');

      const btn = document.getElementById(cfg.btnSaveId);
      btn.innerText = 'Menyimpan...';

      const func = obj.id === '' ? cfg.create : cfg.update;
      gasRun(func, obj, res => {
        btn.innerText = 'Simpan';
        const message = res && typeof res === 'object' ? res.message || 'Operasi selesai.' : res;
        showToast(message, res && res.success === false ? 'error' : 'success');
        if (res && res.success !== false) {
          resetForm(entity);
          loadData(entity);
        }
      }, err => {
        btn.innerText = 'Simpan';
        showToast('Gagal menyimpan: ' + (err && err.message ? err.message : err), 'error');
      });
    }

    // ==========================================
    // EDIT DATA
    // ==========================================
    function editData(entity, ...values) {
      const cfg = crudConfig[entity];
      document.getElementById(cfg.titleFormId).innerText = 'Edit ' + capitalize(entity);
      let i = 0;
      for (const key in cfg.form) {
        setFieldValue(cfg.form[key], values[i++] || '');
      }
      document.getElementById(cfg.btnCancelId).classList.remove('hidden');
    }

    // ==========================================
    // RESET FORM
    // ==========================================
    function resetForm(entity) {
      const cfg = crudConfig[entity];
      document.getElementById(cfg.titleFormId).innerText = 'Tambah ' + capitalize(entity);
      for (const key in cfg.form) {
        setFieldValue(cfg.form[key], '');
      }
      document.getElementById(cfg.btnSaveId).innerText = 'Simpan';
      document.getElementById(cfg.btnCancelId).classList.add('hidden');
    }

    // ==========================================
    // HAPUS DATA
    // ==========================================
    function hapusData(entity, id) {
      const cfg = crudConfig[entity];
      if (confirm('Hapus data ini?')) {
        showToast('Menghapus...');
        gasRun(cfg.delete, id, res => {
          const message = res && typeof res === 'object' ? res.message || 'Operasi selesai.' : res;
          showToast(message, res && res.success === false ? 'error' : 'success');
          if (res && res.success !== false) loadData(entity);
        }, err => {
          showToast('Gagal menghapus: ' + (err && err.message ? err.message : err), 'error');
        });
      }
    }
  </script>
