  <script>
    // ==========================================
    // DASHBOARD - CHART INSTANCES
    // ==========================================
    let chart1Inst = null;
    let chart2Inst = null;

    // ==========================================
    // LOAD DASHBOARD DATA (Gabungan semua)
    // ==========================================
    function loadDataDashboard() {
      google.script.run.withSuccessHandler(renderDashboard).getDashboardSummary();
    }

    function renderDashboard(res) {
      if (!res) return;

      // COMPONENT: Render KPI
      renderKpiCards(res.kpi);

      // COMPONENT: Render Charts
      renderDoughnutChart('chart1', res.chart1Data);
      renderBarChart('chart2', res.chart2Data);

      // COMPONENT: Render Recent Data Table (5 kolom: Siswa, Projek, Tugas, Status, Nilai)
      renderRecentTable('dashRecentData', res.recentData, ['kolom1', 'kolom2', 'kolom3', 'kolom4', 'kolom5']);
    }

    // ==========================================
    // COMPONENT: KPI Cards
    // ==========================================
    // kpiObj: { total1, total2, total3, avg }
    // mapping: { idElement: keyDiObj, ... } — optional, default pakai dashKpi1..4
    function renderKpiCards(kpiObj, mapping) {
      if (!kpiObj) return;
      const map = mapping || {
        dashKpi1: 'total1',
        dashKpi2: 'total2',
        dashKpi3: 'total3',
        dashKpi4: 'avg'
      };
      for (const idEl in map) {
        const el = document.getElementById(idEl);
        if (el) el.innerText = kpiObj[map[idEl]] || 0;
      }
    }

    // ==========================================
    // COMPONENT: Doughnut Chart
    // ==========================================
    // canvasId: ID elemen <canvas>
    // dataObj: { label: count, ... }
    // colors: array warna (optional)
    function renderDoughnutChart(canvasId, dataObj, colors) {
      const ctx = document.getElementById(canvasId);
      if (!ctx) return;

      // Hancurkan instance lama jika ada
      if (canvasId === 'chart1' && chart1Inst) chart1Inst.destroy();
      else if (canvasId === 'chart2' && chart2Inst) chart2Inst.destroy();

      const labels = Object.keys(dataObj || {});
      const values = Object.values(dataObj || {});
      const defaultColors = ['#3b82f6', '#6366f1', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#14b8a6'];

      const newChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: labels.length > 0 ? labels : ['Belum ada data'],
          datasets: [{
            data: values.length > 0 ? values : [1],
            backgroundColor: colors || defaultColors,
            borderWidth: 2,
            borderColor: '#ffffff'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom' } }
        }
      });

      // Simpan instance
      if (canvasId === 'chart1') chart1Inst = newChart;
      else if (canvasId === 'chart2') chart2Inst = newChart;
    }

    // ==========================================
    // COMPONENT: Bar Chart
    // ==========================================
    // canvasId: ID elemen <canvas>
    // dataArr: [{ label: '...', value: N }, ...]
    // warna: string warna (optional)
    function renderBarChart(canvasId, dataArr, warna) {
      const ctx = document.getElementById(canvasId);
      if (!ctx) return;

      // Hancurkan instance lama jika ada
      if (canvasId === 'chart1' && chart1Inst) chart1Inst.destroy();
      else if (canvasId === 'chart2' && chart2Inst) chart2Inst.destroy();

      const labels = (dataArr || []).map(item => item.label);
      const values = (dataArr || []).map(item => item.value);

      const newChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels.length > 0 ? labels : ['Belum ada data'],
          datasets: [{
            label: 'Nilai',
            data: values.length > 0 ? values : [0],
            backgroundColor: warna || '#3b82f6',
            borderRadius: 8,
            maxBarThickness: 40
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } }
        }
      });

      // Simpan instance
      if (canvasId === 'chart1') chart1Inst = newChart;
      else if (canvasId === 'chart2') chart2Inst = newChart;
    }

    // ==========================================
    // COMPONENT: Recent Data Table
    // ==========================================
    // tbodyId: ID elemen <tbody>
    // dataList: [{ key1: val, key2: val, ... }, ...]
    // keys: array nama properti yg mau ditampilkan (optional, default ['kolom1','kolom2','kolom3'])
    function renderRecentTable(tbodyId, dataList, keys) {
      const tbody = document.getElementById(tbodyId);
      if (!tbody) return;
      tbody.innerHTML = '';

      const cols = keys || ['kolom1', 'kolom2', 'kolom3'];
      const colspan = cols.length;

      if (!dataList || dataList.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${colspan}" class="py-4 text-center text-slate-400">Belum ada data.</td></tr>`;
        return;
      }

      dataList.forEach(item => {
        let cells = '';
        cols.forEach(k => {
          cells += `<td class="py-2.5 px-3">${item[k] || '-'}</td>`;
        });
        tbody.innerHTML += `<tr class="hover:bg-slate-50">${cells}</tr>`;
      });
    }
  </script>
