<div id="viewLogin" class="flex items-center justify-center h-full w-full bg-slate-800">
  <div class="bg-white p-10 rounded-xl shadow-2xl w-96 max-w-full">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-800">Aplikasi Saya</h1>
      <p class="text-slate-500 text-sm mt-2">Login Admin Panel</p>
    </div>
    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
        <input type="text" id="username" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
      </div>
      <button id="btnLogin" onclick="prosesLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition">Masuk</button>
    </div>
  </div>
</div>
